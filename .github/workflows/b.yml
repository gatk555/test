name: Build for Linux X86-64 on upstream commits
on:
  workflow_dispatch:
  schedule:
    - cron: '37 11 * * *'

jobs:
  build-lin64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          repository: gatk555/ngspice
          ref: gh_pm47
          fetch-depth: 0
      - name: Pull
        run: |
          touch _pulled_
      - name: Install Dependencies
        if: hashFiles('_pulled_') != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git make bison flex libtool autoconf automake libx11-dev libxaw7-dev libreadline-dev libxmu6 libxft2 libxrender1 libfreetype6 libfontconfig libsndfile1-dev libsamplerate1-dev
      - name: Clean /usr/local
        if: hashFiles('_pulled_') != ''
        run: |
          cd /usr
          sudo mv local l
          sudo mkdir -m777 local
      - name: Build
        if: hashFiles('_pulled_') != ''
        run: |
          ./compile_linux.sh
          echo Create README.ngspice
          echo 'This binary package of ngspice was built at https://github.com/gatk555/ngspice.' > /usr/local/README.ngspice
          echo 'The source code came from the pre-master-47 branch with head revision:' >> /usr/local/README.ngspice
          echo >> /usr/local/README.ngspice
          git log -1 >> /usr/local/README.ngspice
          echo >> /usr/local/README.ngspice
          echo 'Install to /usr/local.' >> /usr/local/README.ngspice
      - name: Save
        if: hashFiles('_pulled_') != ''
        uses: actions/upload-artifact@v6
        with:
          name: Ngspice pre-master-47, Linux X86-64
          path: /usr/local
      - name: Deliberately fail.
        if: hashFiles('_pulled_') == ''
        run: false
      - name: Trigger others
        run: |
          h1='--header="Accept: application/vnd.github+json"'
          h2='--header="X-GitHub-Api-Version: 2022-11-28"'
          h3='--header="Authorization: Bearer "'${{ secrets.GITHUB_TOKEN }}
          eval wget -q $h1 $h2 $h3 --post-data=\''{"ref":"ci"}'\' https://api.github.com/repos/gatk555/test/actions/workflows/o.yml/dispatches

