name: Test Verilator MacOS and Windows
on:
  workflow_dispatch:

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - name: Install Dependencies
        run: |
          brew install libxaw verilator libsndfile libsamplerate
      - uses: actions/checkout@v6
      - uses: dawidd6/action-download-artifact@v8
        with:
         repo: gatk555/test
         workflow: others.yml
         name: Ngspice Test, Macos ARM64
         skip_unpack: true
         workflow_conclusion: ""
      - name: Run
        run: |
          sd=`pwd`
          sudo chmod a+rwx /usr/local /usr/local/share /usr/local/share /usr/local/share/man /usr/local/share/man/man1 || true
          cd /usr/local/
          unzip $sd/'Ngspice Test, Macos ARM64.zip'
          cd $sd
          chmod a+x /usr/local/bin/ngspice
          echo Testing ...
          ngspice vlnggen adc.v
          ls
          ngspice -b -r adc.raw adc_batch.cir
          mkdir ~/results
          cp *.raw ~/results
      - name: Save
        uses: actions/upload-artifact@v6
        with:
          name: Results_Macos
          path: ~/results

  win:
    runs-on: windows-latest
    steps:
      - uses: microsoft/setup-msbuild@v3
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ucrt64
          update: true
          install: >
            make mingw-w64-ucrt-x86_64-verilator mingw-w64-ucrt-x86_64-gcc mingw-w64-ucrt-x86_64-python
      - uses: actions/checkout@v6
      - uses: dawidd6/action-download-artifact@v8
        with:
         repo: gatk555/test
         workflow: others.yml
         name: Ngspice Test, Windows X86-64
         path: C:\Spice64
         workflow_conclusion: ""
      - name: Soundfiles
        shell: cmd
        run: |
          cd ..
          curl.exe -L -O "https://github.com/libsndfile/libsndfile/releases/download/1.2.2/libsndfile-1.2.2-win64.zip"
          unzip libsndfile-1.2.2-win64.zip
          move libsndfile-1.2.2-win64\bin\sndfile.dll c:\Spice64\bin
          curl.exe -L -O "https://github.com/libsndfile/libsamplerate/releases/download/0.2.2/libsamplerate-0.2.2-win64.zip"
          unzip libsamplerate-0.2.2-win64.zip
          move libsamplerate-0.2.2-win64\bin\samplerate.dll c:\Spice64\bin
      - name: Run in MSYS
        shell: msys2 {0}
        run: |
          echo $PATH
          cygpath -m /ucrt64/bin
          echo Testing ...
          /c/spice64/bin/ngspice_con ./vlnggen adc.v
          ls
          /c/spice64/bin/ngspice_con -b -r adc.raw adc_batch.cir
          mkdir results
          cp *.raw results
      - name: Save
        uses: actions/upload-artifact@v6
        with:
          name: Results_Macos
          path: results
