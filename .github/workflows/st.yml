name: Test Simavr Mac X64 build.
on: [workflow_dispatch]

jobs:
  mac:
    runs-on: macos-15-intel
    strategy:
      fail-fast: false
    steps:
      - uses: dawidd6/action-download-artifact@v8
        with:
         workflow: avr_gcc_mac.yml
         name: AVR-GCC for Mac OS Intel 64-bit
         path: .
         use_unzip: true
      - name: Expand tar
        run: |
          h=`pwd`
          cd /usr/local
          tar xvf $h/*.tar.gz || true
      - uses: actions/checkout@v6
        with:
          repository: buserror/simavr
          ref: master
      - name: Install Dependencies
        run: | 
          HOMEBREW_NO_INSTALL_FROM_API=1 brew install make libelf freeglut patchelf 
          HOMEBREW_NO_INSTALL_FROM_API=1 brew tap osx-cross/avr
      - name: CI-Build
        run: |
          export PATH="/usr/local/opt/avr-gcc@9/bin:/usr/local/opt/avr-gcc@9/libexec/gcc/avr/9.5.0:$PATH"
          avr-gcc --version || true
          clang --version
          export CFLAGS="-DGL_SILENCE_DEPRECATION"
          make -j4 V=1 RELEASE=1
          mkdir simavr_installed
          make -k -j4 install-all RELEASE=1 DESTDIR=$(pwd)/simavr_installed/ || true
          file simavr_installed/bin/*
          otool -L simavr_installed/bin/*
          simavr_installed/bin/simavr --list-cores || true
      - name: Tests
        run: |
          cd tests
          make run_tests
      - name: Tar files
        run: tar -cvf simavr.tar.gz -C simavr_installed .
      - uses: actions/upload-artifact@v6
        with:
          name: Mac OS Intel 64-bit
          path: simavr.tar.gz
